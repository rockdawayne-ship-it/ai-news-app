<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 뉴스 브리핑</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-card-hover: #334155;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --text-dim: #64748b;
            --border: #334155;
            --high: #ef4444;
            --medium: #f59e0b;
            --low: #22c55e;
            --tag-bg: #312e81;
            --tag-text: #a5b4fc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-dark), #7c3aed);
            padding: 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }

        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }

        .controls button {
            padding: 0.5rem 1.2rem;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 2rem;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .controls button:hover {
            background: rgba(255,255,255,0.2);
        }

        .controls button.active {
            background: white;
            color: var(--primary-dark);
            border-color: white;
            font-weight: 600;
        }

        .main {
            max-width: 900px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.95rem;
        }

        .loading-sub {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 0.3rem;
        }

        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 2rem 0;
            text-align: center;
        }

        .error h3 {
            color: #fca5a5;
            margin-bottom: 0.5rem;
        }

        .error p {
            color: #fecaca;
            font-size: 0.9rem;
        }

        .error button {
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            background: #dc2626;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s;
            cursor: default;
        }

        .article-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .article-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
            margin-bottom: 0.8rem;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            flex-shrink: 0;
        }

        .source-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            background: var(--tag-bg);
            color: var(--tag-text);
            white-space: nowrap;
        }

        .importance-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .importance-dot.high { background: var(--high); box-shadow: 0 0 8px var(--high); }
        .importance-dot.medium { background: var(--medium); }
        .importance-dot.low { background: var(--low); }

        .article-title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            flex: 1;
        }

        .article-title a {
            color: var(--text);
            text-decoration: none;
        }

        .article-title a:hover {
            color: var(--primary-light);
        }

        .article-summary {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 0.8rem;
            line-height: 1.7;
        }

        .key-points {
            margin-bottom: 0.8rem;
        }

        .key-points li {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-left: 1.2rem;
            margin-bottom: 0.2rem;
        }

        .article-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tags {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .tag {
            font-size: 0.7rem;
            padding: 0.15rem 0.5rem;
            border-radius: 0.8rem;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        .article-date {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-dim);
            font-size: 0.8rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 640px) {
            .header h1 { font-size: 1.4rem; }
            .main { padding: 1rem; }
            .article-card { padding: 1.2rem; }
            .article-header { flex-direction: column; }
            .article-meta { order: -1; }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ========== 상태 관리 ==========
        const state = {
            articles: [],
            loading: true,
            error: null,
            filter: 'all', // all, high, medium, low
            fetchedAt: null,
            total: 0,
        };

        // ========== API 호출 ==========
        async function fetchNews() {
            state.loading = true;
            state.error = null;
            render();

            try {
                const res = await fetch('/api/news?max_articles=15&summarize=true');
                if (!res.ok) {
                    throw new Error(`서버 오류 (${res.status})`);
                }
                const data = await res.json();
                state.articles = data.articles || [];
                state.total = data.total || 0;
                state.fetchedAt = data.fetched_at;
                state.loading = false;
            } catch (err) {
                state.error = err.message;
                state.loading = false;
            }
            render();
        }

        // ========== 유틸리티 ==========
        function formatDate(dateStr) {
            if (!dateStr) return '';
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                const now = new Date();
                const diff = now - date;
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours < 1) return '방금 전';
                if (hours < 24) return `${hours}시간 전`;
                const days = Math.floor(hours / 24);
                if (days < 7) return `${days}일 전`;
                return date.toLocaleDateString('ko-KR');
            } catch {
                return dateStr;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ========== 렌더링 ==========
        function render() {
            const app = document.getElementById('app');
            const filtered = state.filter === 'all'
                ? state.articles
                : state.articles.filter(a => a.importance === state.filter);

            app.innerHTML = `
                <div class="header">
                    <h1>AI 뉴스 브리핑</h1>
                    <p>RSS 피드 + Claude AI 요약으로 만든 AI 뉴스 큐레이션</p>
                    <div class="controls">
                        <button class="${state.filter === 'all' ? 'active' : ''}" onclick="setFilter('all')">전체</button>
                        <button class="${state.filter === 'high' ? 'active' : ''}" onclick="setFilter('high')">중요</button>
                        <button class="${state.filter === 'medium' ? 'active' : ''}" onclick="setFilter('medium')">보통</button>
                        <button class="${state.filter === 'low' ? 'active' : ''}" onclick="setFilter('low')">참고</button>
                        <button onclick="fetchNews()">새로고침</button>
                    </div>
                </div>

                <div class="main">
                    ${state.loading ? renderLoading() : ''}
                    ${state.error ? renderError() : ''}
                    ${!state.loading && !state.error ? renderContent(filtered) : ''}
                </div>

                <div class="footer">
                    AI 뉴스 브리핑 &mdash; Claude API + RSS 피드로 구동
                </div>
            `;
        }

        function renderLoading() {
            return `
                <div class="loading">
                    <div class="spinner"></div>
                    <div class="loading-text">AI 뉴스를 불러오는 중...</div>
                    <div class="loading-sub">RSS 피드 수집 및 Claude AI 요약 생성 중 (약 10-20초)</div>
                </div>
            `;
        }

        function renderError() {
            return `
                <div class="error">
                    <h3>뉴스를 불러올 수 없습니다</h3>
                    <p>${escapeHtml(state.error)}</p>
                    <button onclick="fetchNews()">다시 시도</button>
                </div>
            `;
        }

        function renderContent(articles) {
            if (articles.length === 0) {
                return `
                    <div class="empty-state">
                        <h3>표시할 뉴스가 없습니다</h3>
                        <p>필터를 변경하거나 새로고침해 보세요.</p>
                    </div>
                `;
            }

            const statusBar = `
                <div class="status-bar">
                    <span>${articles.length}개의 AI 뉴스</span>
                    <span>${state.fetchedAt ? '마지막 업데이트: ' + new Date(state.fetchedAt).toLocaleTimeString('ko-KR') : ''}</span>
                </div>
            `;

            const cards = articles.map(article => {
                const importance = article.importance || 'medium';
                const tags = (article.tags || []).map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('');
                const keyPoints = (article.key_points || []).map(p => `<li>${escapeHtml(p)}</li>`).join('');

                return `
                    <div class="article-card">
                        <div class="article-header">
                            <div class="article-title">
                                <a href="${escapeHtml(article.link)}" target="_blank" rel="noopener noreferrer">
                                    ${escapeHtml(article.title)}
                                </a>
                            </div>
                            <div class="article-meta">
                                <span class="importance-dot ${importance}" title="중요도: ${importance}"></span>
                                <span class="source-badge">${escapeHtml(article.source)}</span>
                            </div>
                        </div>

                        ${article.summary_ko ? `<div class="article-summary">${escapeHtml(article.summary_ko)}</div>` : ''}

                        ${keyPoints ? `<ul class="key-points">${keyPoints}</ul>` : ''}

                        <div class="article-footer">
                            <div class="tags">${tags}</div>
                            <span class="article-date">${formatDate(article.published)}</span>
                        </div>
                    </div>
                `;
            }).join('');

            return statusBar + cards;
        }

        // ========== 이벤트 핸들러 ==========
        function setFilter(filter) {
            state.filter = filter;
            render();
        }

        // ========== 앱 시작 ==========
        fetchNews();
    </script>
</body>
</html>
